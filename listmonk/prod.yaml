apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: listmonk-prod
  namespace: flux-system
spec:
  interval: 1m
  path: "./listmonk"
  prune: false # first adoption only, set to true after adoption
  sourceRef:
    kind: GitRepository
    name: listmonk
  serviceAccountName: app-deployer
  targetNamespace: listmonk-prod
---
apiVersion: v1
kind: Namespace
metadata:
  name: listmonk-prod
